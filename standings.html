<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standings | Swiss Tournament Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">♞</div>
          <div><h1>Swiss Manager</h1><span>Chess Tournaments</span></div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="players.html"><span class="nav-icon">👥</span> Players</a>
        <a href="pairings.html"><span class="nav-icon">📋</span> Pairings</a>
        <a href="results.html"><span class="nav-icon">✓</span> Results</a>
        <a href="standings.html" class="active"><span class="nav-icon">🏆</span> Standings</a>
        <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="sidebar-footer"><small style="color:var(--text-muted)">v1.0</small></div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
          <h2 class="page-title" id="pageTitle">Standings</h2>
        </div>
        <div class="topbar-right">
          <button class="btn btn-secondary btn-sm" id="btnRefreshStandings">Refresh</button>
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </div>
      </header>

      <div class="content-area">
        <div class="alert alert-info" style="margin-bottom:1rem">
          Standings update live as results are entered. Sorted by points, Buchholz, Sonneborn-Berger, and rating.
        </div>

        <div class="card">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Rank</th>
                  <th>Player</th>
                  <th>Rating</th>
                  <th>Pts</th>
                  <th>Buchholz</th>
                  <th class="hide-mobile">S-B</th>
                  <th class="hide-mobile">Games</th>
                  <th class="hide-mobile">Colors</th>
                  <th class="hide-mobile">Opps</th>
                </tr>
              </thead>
              <tbody id="standingsTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/standings.js"></script>
  <script src="js/pairing-engine.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      App.renderLayout('Standings');
      App.renderStandings();
      document.getElementById('btnRefreshStandings')?.addEventListener('click', () => {
        App.renderStandings();
        App.toast('Standings updated', 'success');
      });
    });
  </script>
</body>
</html>
