<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results | Swiss Tournament Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon">♞</div>
          <div><h1>Swiss Manager</h1><span>Chess Tournaments</span></div>
        </div>
      </div>
      <nav class="nav-links">
        <a href="index.html"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="players.html"><span class="nav-icon">👥</span> Players</a>
        <a href="pairings.html"><span class="nav-icon">📋</span> Pairings</a>
        <a href="results.html" class="active"><span class="nav-icon">✓</span> Results</a>
        <a href="standings.html"><span class="nav-icon">🏆</span> Standings</a>
        <a href="settings.html"><span class="nav-icon">⚙️</span> Settings</a>
      </nav>
      <div class="sidebar-footer"><small style="color:var(--text-muted)">v1.2</small></div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
          <h2 class="page-title" id="pageTitle">Results</h2>
        </div>
        <div class="topbar-right">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
        </div>
      </header>

      <div class="content-area">
        <div class="toolbar">
          <div class="btn-group">
            <button class="btn btn-secondary" id="btnViewRound">By Round</button>
            <button class="btn btn-secondary" id="btnViewMatrix">Results Grid</button>
            <button class="btn btn-secondary" id="btnExportResults">Export CSV</button>
          </div>
          <a href="pairings.html" class="btn btn-primary btn-sm">Enter on Pairings →</a>
        </div>

        <div class="round-tabs" id="roundTabs"></div>
        <div id="roundInfo"></div>

        <div class="card" id="resultsCard">
          <div id="resultsContent"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/standings.js"></script>
  <script src="js/pairing-engine.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
  <script src="js/results.js"></script>
</body>
</html>
